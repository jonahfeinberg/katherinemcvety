<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katherine McVety</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/jpeg" href="assets/favicon.jpg" />
</head>
<body class="index-page">

  <a href="#" class="logo" title="Katherine McVety"><span>K</span></a>

  <header class="site-header">
    <a href="#" class="site-title">Katherine McVety</a>
    <ul class="nav-links">
      <li><a href=portfolios/>Portfolios</a></li>
      <li><a href="bio/">Bio</a></li>
      <li><a href="exhibitions.pdf" target="_blank">Exhibitions</a></li>
    </ul>
  </header>

  <div class="index-content page-content">
    <div class="featured-photo" id="featuredPhoto">
      <img id="featuredImg" src="" alt="Featured photograph" onclick="openLightbox(this.src, '', [])" />
    </div>
    <div class="contact-line">
      <button onclick="copyEmail()">Contact</button>
      <span class="copy-confirm" id="copyConfirm">Email copied</span>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightboxClose">&times;</span>
    <button class="lightbox-arrow prev" id="lightboxPrev">&#8249;</button>
    <div class="lightbox-inner" id="lightboxInner">
      <img id="lightboxImg" src="" alt="" />
      <span class="lightbox-caption" id="lightboxCaption"></span>
    </div>
    <button class="lightbox-arrow next" id="lightboxNext">&#8250;</button>
  </div>

  <script src="js/main.js"></script>
  <script src="js/slideshow.js"></script>
</body>
</html>
